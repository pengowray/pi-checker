<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a1a">
  <title>Pi Checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-titles">
      <h1 id="app-title">&pi; Checker</h1>
      <p class="subtitle">How many digits do you know?</p>
    </div>
    <div class="header-actions">
      <button id="settings-toggle" aria-label="Settings" title="Settings">&#x2699;</button>
      <button id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">&#x1F319;</button>
    </div>
  </header>

  <main>
    <div id="comp-timer" class="comp-timer" hidden role="button" tabindex="0" aria-label="Competitive countdown, click to hide" title="Click to hide / show">15:00</div>
    <button class="mode-badge" id="mode-badge" type="button" aria-label="Open settings">Practice &middot; 3s auto-check</button>

    <section class="display-area" aria-live="polite">
      <div id="pi-display" class="pi-display">
        <div class="pi-row">
          <span class="prefix" id="prefix">3.</span>
          <div class="pi-body">
            <span id="user-digits"></span><span class="cursor" id="cursor">|</span>
          </div>
        </div>
      </div>
    </section>

    <section class="stats">
      <div><div class="stat-label">Correct</div><div class="stat-value" id="stat-correct">0</div></div>
      <div><div class="stat-label">Wrong</div><div class="stat-value" id="stat-wrong">0</div></div>
      <div><div class="stat-label">Erased</div><div class="stat-value" id="stat-erased">0</div></div>
      <div><div class="stat-label">Skipped</div><div class="stat-value" id="stat-skipped">0</div></div>
      <div><div class="stat-label">Pasted</div><div class="stat-value" id="stat-pasted">0</div></div>
    </section>

    <div class="keypad-hint" id="keypad-hint">Enter digit 1 of &pi;:</div>

    <section class="keypad keypad-decimal" id="keypad-decimal" role="group" aria-label="Numeric keypad">
      <button class="key" data-digit="1">1</button>
      <button class="key" data-digit="2">2</button>
      <button class="key" data-digit="3">3</button>
      <button class="key" data-digit="4">4</button>
      <button class="key" data-digit="5">5</button>
      <button class="key" data-digit="6">6</button>
      <button class="key" data-digit="7">7</button>
      <button class="key" data-digit="8">8</button>
      <button class="key" data-digit="9">9</button>
      <button class="key key-check" data-action="check" aria-label="Check">&#x2713;</button>
      <button class="key" data-digit="0">0</button>
      <button class="key key-back" data-action="back" aria-label="Backspace">&#x232B;</button>
    </section>

    <section class="keypad keypad-hex" id="keypad-hex" role="group" aria-label="Hex keypad" hidden>
      <button class="key" data-digit="1">1</button>
      <button class="key" data-digit="2">2</button>
      <button class="key" data-digit="3">3</button>
      <button class="key" data-digit="A">A</button>
      <button class="key" data-digit="4">4</button>
      <button class="key" data-digit="5">5</button>
      <button class="key" data-digit="6">6</button>
      <button class="key" data-digit="B">B</button>
      <button class="key" data-digit="7">7</button>
      <button class="key" data-digit="8">8</button>
      <button class="key" data-digit="9">9</button>
      <button class="key" data-digit="C">C</button>
      <button class="key key-check" data-action="check" aria-label="Check">&#x2713;</button>
      <button class="key" data-digit="0">0</button>
      <button class="key key-back" data-action="back" aria-label="Backspace">&#x232B;</button>
      <button class="key" data-digit="D">D</button>
      <button class="key" data-digit="E">E</button>
      <button class="key" data-digit="F">F</button>
    </section>

    <section class="actions">
      <button id="reset-btn" type="button">Reset</button>
      <div class="actions-conditional">
        <button id="stop-btn" type="button" hidden>Stop</button>
        <button id="continue-btn" type="button" hidden>Continue in practice mode</button>
      </div>
      <span id="stat-time" class="stat-time" aria-label="Elapsed time">0:00</span>
    </section>

    <footer class="foot">
      Type, tap, or paste. <kbd>Backspace</kbd>, <kbd>Enter</kbd> to check.
    </footer>
  </main>

  <div id="settings-modal" class="modal" hidden aria-hidden="true" role="dialog" aria-modal="true" aria-label="Settings">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card">
      <div class="modal-head">
        <h2>Settings</h2>
        <button id="settings-close" aria-label="Close" data-close>&#x2715;</button>
      </div>
      <div class="modal-body">
        <div class="setting">
          <div class="setting-label">
            <label for="sequence">Sequence</label>
            <button type="button" class="setting-reset" data-reset="sequence" hidden aria-label="Reset sequence to default">&#x2715;</button>
          </div>
          <select id="sequence" class="setting-select">
            <option value="pi">&pi; (pi)</option>
            <option value="phi">&phi; (golden ratio)</option>
            <option value="sqrt2">&radic;2</option>
            <option value="pi-binary">&pi; in binary</option>
            <option value="pi-hex">&pi; in hex</option>
          </select>
        </div>

        <div class="setting">
          <div class="setting-label">
            <label for="start-at">Start at digit</label>
            <button type="button" class="setting-reset" data-reset="start-at" hidden aria-label="Reset start-at to default">&#x2715;</button>
          </div>
          <div class="setting-inline">
            <input type="number" id="start-at" min="0" value="0">
          </div>
        </div>

        <div class="setting">
          <div class="setting-label">Mode</div>
          <div class="mode-selector" role="radiogroup" aria-label="Mode">
            <label class="mode-option">
              <input type="radio" name="mode" value="practice" checked>
              <span>Practice</span>
            </label>
            <label class="mode-option">
              <input type="radio" name="mode" value="hardcore">
              <span>Hardcore</span>
            </label>
            <label class="mode-option">
              <input type="radio" name="mode" value="competitive">
              <span>Competitive</span>
            </label>
          </div>
          <small id="mode-hint" class="hint"></small>
        </div>

        <div class="setting">
          <div class="setting-label">
            Auto-check delay: <strong id="auto-seconds-label">3s</strong>
            <button type="button" class="setting-reset" data-reset="auto-check" hidden aria-label="Reset auto-check delay to default">&#x2715;</button>
          </div>
          <input type="range" id="auto-seconds" min="0" max="31" value="3" step="1">
        </div>

        <h3 class="settings-subhead">Display</h3>

        <div class="setting">
          <div class="setting-label">Theme</div>
          <div class="mode-selector" role="radiogroup" aria-label="Theme">
            <label class="mode-option">
              <input type="radio" name="theme" value="light">
              <span>Light</span>
            </label>
            <label class="mode-option">
              <input type="radio" name="theme" value="dark">
              <span>Dark</span>
            </label>
          </div>
        </div>

        <div class="setting">
          <div class="setting-label">
            Practice display
            <button type="button" class="setting-reset" data-reset="practice-display" hidden aria-label="Reset practice display to default">&#x2715;</button>
          </div>
          <div class="mode-selector" role="radiogroup" aria-label="Practice display">
            <label class="mode-option">
              <input type="radio" name="practice-display" value="oneline">
              <span>One line</span>
            </label>
            <label class="mode-option">
              <input type="radio" name="practice-display" value="annotations" checked>
              <span>Annotations</span>
            </label>
          </div>
        </div>

        <div class="setting">
          <div class="setting-label">
            Keypad layout
            <button type="button" class="setting-reset" data-reset="keypad-flip" hidden aria-label="Reset keypad layout to default">&#x2715;</button>
          </div>
          <div class="mode-selector" role="radiogroup" aria-label="Keypad layout">
            <label class="mode-option">
              <input type="radio" name="keypad-flip" value="phone" checked>
              <span>Phone (1 top)</span>
            </label>
            <label class="mode-option">
              <input type="radio" name="keypad-flip" value="numpad">
              <span>Numpad (7 top)</span>
            </label>
          </div>
        </div>

        <div class="setting">
          <div class="setting-label">
            <label for="group-size">Group digits</label>
            <button type="button" class="setting-reset" data-reset="group-size" hidden aria-label="Reset grouping to default">&#x2715;</button>
          </div>
          <select id="group-size" class="setting-select">
            <option value="0">Off</option>
            <option value="2">Groups of 2</option>
            <option value="3">Groups of 3</option>
            <option value="4">Groups of 4</option>
            <option value="5">Groups of 5</option>
            <option value="6">Groups of 6</option>
            <option value="7">Groups of 7</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <script src="sequences.js"></script>
  <script src="script.js"></script>
</body>
</html>
